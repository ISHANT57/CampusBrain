# Production stack (M60). Differences from docker-compose.yml that matter:
#   - No bind mounts. Code is baked into images, so what you tested is what
#     runs; a stray edit on the server can't silently change behaviour.
#   - Only nginx publishes ports. Postgres/Redis/MinIO/Qdrant/Ollama stay on
#     the internal network instead of being reachable from the internet.
#   - uvicorn runs without --reload (the dev Dockerfile's CMD) and with
#     multiple workers.
#   - Migrations run as a gated one-shot step before the API starts.
#
# Usage:
#   cp .env.production.example .env.production   # then fill in real secrets
#   docker compose -f docker-compose.prod.yml --env-file ../.env.production up -d --build

services:
  # Runs alembic to completion, then exits. backend/worker wait on it, so the
  # API never serves against a schema that hasn't been migrated yet.
  migrate:
    build: ../backend
    env_file: [../.env.production]
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  backend:
    build: ../backend
    env_file: [../.env.production]
    # Overrides the dev CMD, which ends in --reload. --reload watches the
    # filesystem and restarts on change: wasted memory here, and it masks
    # crashes by silently restarting.
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    expose: ["8000"]
    restart: unless-stopped
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  worker:
    build: ../backend
    env_file: [../.env.production]
    command: ["arq", "app.workers.worker.WorkerSettings"]
    restart: unless-stopped
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  # Serves the built SPA and proxies /api to the backend. The only service
  # with published ports.
  web:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
      # - "443:443"   # uncomment with the TLS block in nginx.conf
    restart: unless-stopped
    depends_on: [backend]
    # volumes:
    #   - certbot_certs:/etc/letsencrypt:ro
    #   - certbot_webroot:/var/www/certbot:ro

  postgres:
    image: postgres:16-alpine
    env_file: [../.env.production]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    env_file: [../.env.production]
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Still required: embeddings (BGE-M3) are served by Ollama even though the
  # LLM itself goes out to OpenRouter. The model must be pulled once on the
  # host after first boot — see docker/README.md.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  ollama_data:
