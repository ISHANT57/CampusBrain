# Production stack for the self-hosted-VPS path. If you're deploying to
# Render + Vercel instead (the currently chosen path — see backend/MIGRATION.md
# and DEPLOYMENT.md), you don't use this file at all: Render builds
# backend/Dockerfile directly and Vercel builds the frontend; there's no
# docker-compose involved. Kept as a documented alternative for a plain VPS.
#
# Differences from docker-compose.yml that matter:
#   - No bind mounts. Code is baked into images, so what you tested is what
#     runs; a stray edit on the server can't silently change behaviour.
#   - Only nginx publishes ports. Postgres/Qdrant stay on the internal
#     network instead of being reachable from the internet.
#   - uvicorn runs without --reload (the dev Dockerfile's CMD) and with
#     multiple workers.
#   - Migrations run as a gated one-shot step before the API starts.
#
# No redis, no worker service, no ollama, no self-hosted minio: document
# processing runs as a FastAPI BackgroundTask inside the backend process (see
# services/document_processing_service.py) instead of a separate arq worker
# pulling from a Redis queue; embeddings come from the Gemini API instead of a
# self-hosted Ollama instance; object storage is Supabase's S3-compatible API
# (set STORAGE_* in .env.production same as the Render path — see
# backend/MIGRATION.md for the reasoning on all three).
#
# Usage:
#   cp .env.production.example .env.production   # then fill in real secrets
#   docker compose -f docker-compose.prod.yml --env-file ../.env.production up -d --build

services:
  # Runs alembic to completion, then exits. backend waits on it, so the API
  # never serves against a schema that hasn't been migrated yet.
  migrate:
    build: ../backend
    env_file: [../.env.production]
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  backend:
    build: ../backend
    env_file: [../.env.production]
    # Overrides the dev CMD, which ends in --reload. --reload watches the
    # filesystem and restarts on change: wasted memory here, and it masks
    # crashes by silently restarting.
    #
    # NOTE on --workers 4 + the in-memory rate limiter (core/rate_limit.py):
    # slowapi's default in-memory store counts per PROCESS. With 4 worker
    # processes, a client's requests land on whichever process picks them up,
    # so the @limiter.limit("20/minute") on /ask and /chat is enforced up to
    # ~4x more loosely than it reads. Fine for this app's traffic level; if
    # that ever matters, point storage_uri at a shared store (Upstash Redis's
    # free tier, e.g.) rather than dropping to --workers 1.
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    expose: ["8000"]
    restart: unless-stopped
    depends_on:
      migrate: { condition: service_completed_successfully }

  # Serves the built SPA and proxies /api to the backend. The only service
  # with published ports.
  web:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
      # - "443:443"   # uncomment with the TLS block in nginx.conf
    restart: unless-stopped
    depends_on: [backend]
    # volumes:
    #   - certbot_certs:/etc/letsencrypt:ro
    #   - certbot_webroot:/var/www/certbot:ro

  postgres:
    image: postgres:16-alpine
    env_file: [../.env.production]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
