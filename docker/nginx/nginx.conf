
# Production edge server. Does the two jobs the Vite dev server did in dev:
# serves the built frontend, and routes /api/* to the backend. The Vite dev
# proxy does not exist in a production build, so without this every
# fetch("/api/v1/...") from the browser would 404.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router owns the client-side routes. Without this fallback a
    # refresh on /chat or /upload asks nginx for a file that isn't on disk
    # and 404s — the SPA has to boot from index.html and route internally.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Document uploads are the whole point of the app; nginx's 1 MB
        # default would reject most real PDFs with a 413.
        client_max_body_size 50m;

        # A RAG answer is retrieval + an LLM round trip. The 60s default
        # cuts long answers off mid-stream as a 504.
        proxy_read_timeout 300s;
    }

    # Backend liveness check. It lives at the API root rather than under
    # /api/, so the block above doesn't cover it — without this there is no
    # way to health-check the backend through the edge (uptime monitors,
    # load balancers).
    location = /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # Vite content-hashes filenames in dist/assets, so a given URL's bytes
    # never change — safe to cache hard. index.html deliberately is not
    # cached here, so a deploy is picked up on the next load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Modest hardening. HSTS is deliberately left out until TLS is actually
    # terminated here — sending it over plain HTTP would be wrong.
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}

# ---------------------------------------------------------------------------
# TLS (M61). Uncomment once a domain points at this host and certbot has
# issued a cert — see docker/README.md. Kept commented rather than enabled
# because nginx refuses to start if the cert files don't exist yet, which
# would make the whole stack fail to come up on a fresh deploy.
