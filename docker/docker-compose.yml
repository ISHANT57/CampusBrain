services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campusbrain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - paddleocr_models:/root/.paddleocr
      # Read-only, and only in the dev stack: lets tools/ingest.py run inside
      # this container, which is the one place that already has libmagic,
      # unstructured and paddleocr installed. Not in docker-compose.prod.yml —
      # ingestion is an operator task, not something the deployed app does.
      #   docker compose exec backend python /tools/ingest.py /resources
      - ../tools:/tools:ro
      - ../resources:/resources:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    environment:
      # Passed through from the host shell (set by Codespaces, empty locally).
      # vite.config.ts uses it to point the HMR socket at the forwarded URL.
      - CODESPACE_NAME
    volumes:
      - ../frontend:/app
      # Anonymous volume so the container keeps its own node_modules instead of
      # having the host's (absent, or built for another OS) shadow it via the
      # bind mount above. Caveat: compose REUSES this volume on recreate, so
      # after changing package.json rebuild with `-V` to renew it:
      #   docker compose up -d --build -V frontend
      - /app/node_modules
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
  paddleocr_models:
