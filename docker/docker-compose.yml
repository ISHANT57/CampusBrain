services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campusbrain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - paddleocr_models:/root/.paddleocr
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    environment:
      # Passed through from the host shell (set by Codespaces, empty locally).
      # vite.config.ts uses it to point the HMR socket at the forwarded URL.
      - CODESPACE_NAME
    volumes:
      - ../frontend:/app
      # Anonymous volume so the container keeps its own node_modules instead of
      # having the host's (absent, or built for another OS) shadow it via the
      # bind mount above. Caveat: compose REUSES this volume on recreate, so
      # after changing package.json rebuild with `-V` to renew it:
      #   docker compose up -d --build -V frontend
      - /app/node_modules
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  paddleocr_models:
