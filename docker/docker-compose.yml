services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campusbrain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
